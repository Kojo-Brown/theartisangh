name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: read

env:
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

jobs:
  ci:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: imresamu/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: artisan
          POSTGRES_PASSWORD: artisan
          POSTGRES_DB: artisan
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U artisan -d artisan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://artisan:artisan@localhost:5432/artisan?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-not-real
      JWT_REFRESH_SECRET: ci-refresh-secret-not-real

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm --filter @artisangh/db prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Derive Nx affected base
        uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: pnpm exec nx affected -t lint --parallel=3

      - name: Typecheck
        run: pnpm exec nx affected -t typecheck --parallel=3

      - name: Test
        run: pnpm exec nx affected -t test --parallel=3 --passWithNoTests

      - name: Build
        run: pnpm exec nx affected -t build --parallel=3
