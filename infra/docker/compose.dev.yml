name: artisangh-dev

services:
  postgres:
    # The official postgis/postgis image has no arm64 build for 17-3.5 (yet).
    # imresamu/postgis is the de-facto multi-arch fork, identical CLI + extensions.
    image: imresamu/postgis:17-3.5-alpine
    container_name: artisangh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artisan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artisan}
      POSTGRES_DB: ${POSTGRES_DB:-artisan}
    ports:
      # Host port is 55432 to avoid collision with locally-installed Postgres (5432) or
      # other Postgres dev mappings (5433). Update DATABASE_URL accordingly.
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-artisan} -d ${POSTGRES_DB:-artisan}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: artisangh_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: artisangh_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-artisan}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-artisan_dev_secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  # MailHog is unmaintained and has no arm64 image — using its modern drop-in replacement.
  mailpit:
    image: axllent/mailpit:latest
    container_name: artisangh_mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
